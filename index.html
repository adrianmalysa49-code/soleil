<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Soleil — Twój przyjaciel</title>

<!-- PWA -->
<meta name="application-name" content="Soleil">
<meta name="description" content="Twój przyjaciel AI — zawsze tu, by poprawić Ci nastrój">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Soleil">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8845a">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6ee;
    --accent: #e8845a;
    --accent2: #f2b48a;
    --accent3: #7dbdb5;
    --text: #3a2e28;
    --muted: #9e8e83;
    --shadow: rgba(180, 120, 80, 0.13);
  }

  html, body {
    height: 100%;
    height: -webkit-fill-available;
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(242,180,138,0.28) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 85%, rgba(125,189,181,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 40%, rgba(232,132,90,0.09) 0%, transparent 60%);
    z-index: 0;
    pointer-events: none;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { opacity: 1; } 100% { opacity: 0.6; }
  }

  .particles {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }

  .particle {
    position: absolute; border-radius: 50%; opacity: 0.18;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) scale(1); opacity: 0; }
    10% { opacity: 0.18; } 90% { opacity: 0.18; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .app {
    position: relative; z-index: 1;
    height: 100vh; height: -webkit-fill-available;
    display: flex; flex-direction: column;
    max-width: 760px; margin: 0 auto;
    padding: 0 16px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding: 24px 0 16px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
  }

  .logo-circle {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(232,132,90,0.35);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 16px rgba(232,132,90,0.35); }
    50% { box-shadow: 0 4px 28px rgba(232,132,90,0.58); }
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--accent); line-height: 1;
  }

  .header-text p {
    font-size: 0.78rem; color: var(--muted);
    font-weight: 300; margin-top: 2px; letter-spacing: 0.04em;
  }

  .status-dot {
    width: 8px; height: 8px; background: #5dbf8a;
    border-radius: 50%; display: inline-block; margin-right: 5px;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .chat-window {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 16px; padding: 10px 4px 16px;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 4px; }

  .welcome {
    text-align: center; padding: 28px 20px;
    animation: fadeSlideIn 0.7s ease both;
  }

  .welcome .sun {
    font-size: 3rem; display: block; margin-bottom: 12px;
    animation: spinSlow 20s linear infinite;
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); } to { transform: rotate(360deg); }
  }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; color: var(--accent); margin-bottom: 8px;
  }

  .welcome p {
    color: var(--muted); font-size: 0.9rem;
    font-weight: 300; line-height: 1.6;
    max-width: 420px; margin: 0 auto;
  }

  .suggestions {
    display: flex; flex-wrap: wrap;
    gap: 8px; justify-content: center; margin-top: 20px;
  }

  .suggestion-btn {
    background: white; border: 1.5px solid var(--accent2);
    color: var(--accent); padding: 7px 14px; border-radius: 20px;
    font-size: 0.82rem; font-family: 'Lato', sans-serif;
    cursor: pointer; transition: all 0.22s ease;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .suggestion-btn:hover {
    background: var(--accent); color: white;
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(232,132,90,0.3);
  }

  .message-row {
    display: flex; gap: 10px;
    animation: fadeSlideIn 0.4s ease both;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 15px; margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 2px 8px rgba(232,132,90,0.3);
  }

  .avatar.user { background: linear-gradient(135deg, var(--accent3), #5dbfb7); }

  .bubble {
    max-width: 72%; padding: 13px 17px;
    border-radius: 18px; font-size: 0.92rem;
    line-height: 1.65; box-shadow: 0 3px 12px var(--shadow);
  }

  .bubble.ai {
    background: white; border-bottom-left-radius: 4px;
    color: var(--text); border: 1px solid rgba(232,132,90,0.12);
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--accent), #e8a07a);
    border-bottom-right-radius: 4px; color: white;
  }

  .typing-indicator {
    display: flex; gap: 5px; padding: 14px 17px; align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px; background: var(--accent2);
    border-radius: 50%; animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-7px); opacity: 1; }
  }

  .input-area { padding: 14px 0 22px; flex-shrink: 0; }

  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: white; border-radius: 26px;
    padding: 10px 10px 10px 20px;
    box-shadow: 0 4px 24px var(--shadow), 0 1px 4px rgba(0,0,0,0.05);
    border: 1.5px solid rgba(232,132,90,0.18);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 4px 28px rgba(232,132,90,0.22), 0 1px 4px rgba(0,0,0,0.05);
  }

  #userInput {
    flex: 1; border: none; outline: none;
    font-family: 'Lato', sans-serif; font-size: 0.93rem;
    color: var(--text); background: transparent;
    resize: none; min-height: 22px; max-height: 120px; line-height: 1.5;
  }

  #userInput::placeholder { color: var(--muted); font-weight: 300; }

  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.22s ease;
    box-shadow: 0 2px 10px rgba(232,132,90,0.35);
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 18px rgba(232,132,90,0.5); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .mood-bar {
    display: flex; justify-content: center;
    gap: 18px; padding: 6px 0 0;
    font-size: 1.1rem; opacity: 0.55;
  }

  #installBanner {
    display: none; position: fixed; bottom: 80px;
    left: 50%; transform: translateX(-50%); z-index: 999;
    background: white; border-radius: 16px; padding: 14px 18px;
    box-shadow: 0 8px 32px rgba(180,120,80,0.22);
    border: 1.5px solid rgba(232,132,90,0.2);
    align-items: center; gap: 12px;
    max-width: 340px; width: 90%;
    font-family: 'Lato', sans-serif;
  }

  * { scrollbar-width: thin; scrollbar-color: var(--accent2) transparent; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div id="installBanner">
  <span style="font-size:1.4rem">📲</span>
  <div style="flex:1;font-size:0.83rem;color:#3a2e28;line-height:1.4"><strong>Dodaj Soleil</strong> do ekranu głównego</div>
  <button id="installBtn" style="background:#e8845a;color:white;border:none;border-radius:10px;padding:7px 13px;font-size:0.8rem;cursor:pointer;font-family:'Lato',sans-serif">Dodaj</button>
  <button id="installDismiss" style="background:none;border:none;color:#9e8e83;cursor:pointer;font-size:1.1rem;padding:0 2px">✕</button>
</div>

<div class="app">
  <header>
    <div class="logo-circle">☀️</div>
    <div class="header-text">
      <h1>Soleil</h1>
      <p><span class="status-dot"></span>Zawsze tutaj, by pomóc Ci poczuć się lepiej</p>
    </div>
  </header>

  <div class="chat-window" id="chatWindow">
    <div class="welcome" id="welcomeMsg">
      <span class="sun">🌻</span>
      <h2>Hej, jestem tu dla Ciebie</h2>
      <p>Możesz mi powiedzieć wszystko — swoje troski, problemy, smutki. Pomogę Ci spojrzeć na nie z nowej perspektywy i sprawi, że poczujesz się lepiej. 💛</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Czuję się dziś bardzo smutny/a')">😔 Jestem smutny/a</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Mam problem w pracy i nie wiem co robić')">💼 Problem w pracy</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Pokłóciłem/am się z bliską osobą')">💔 Kłótnia z kimś bliskim</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Jestem bardzo zestresowany/a')">😰 Czuję stres</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Napisz mi o swoim dniu, problemie lub jak się czujesz..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="mood-bar">🌸 🌈 ✨ 🌻 💛 🌿 🤗</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  🔑 WSTAW TUTAJ SWÓJ KLUCZ API (tylko do testów!)
//  Przed wdrożeniem przenieś go do Vercel Env Variables
// ═══════════════════════════════════════════════════
const ANTHROPIC_API_KEY = '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';

// Particles
(function() {
  const container = document.getElementById('particles');
  const colors = ['#e8845a','#f2b48a','#7dbdb5','#ffd6b0','#b5e0dc'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 6 + Math.random() * 20;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${12+Math.random()*18}s;animation-delay:${-Math.random()*20}s;`;
    container.appendChild(p);
  }
})();

// PWA install banner
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
  document.getElementById('installBanner').style.display = 'none';
});
document.getElementById('installDismiss').addEventListener('click', () => {
  document.getElementById('installBanner').style.display = 'none';
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

// Auto-resize textarea
const input = document.getElementById('userInput');
input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

const chatWindow = document.getElementById('chatWindow');
const welcomeMsg = document.getElementById('welcomeMsg');
let conversationHistory = [];
let firstMessage = true;

function appendMessage(role, text) {
  if (firstMessage) { welcomeMsg.style.display = 'none'; firstMessage = false; }
  const row = document.createElement('div');
  row.className = `message-row ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '☀️' : '🙂';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  row.appendChild(avatar);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'message-row ai';
  row.id = 'typingRow';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '☀️';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai typing-indicator';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(avatar);
  row.appendChild(bubble);
  chatWindow.appendChild(row);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

function sendSuggestion(text) {
  input.value = text;
  sendMessage();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  const systemPrompt = `Jesteś Soleil — ciepłym, empatycznym przyjacielem AI, który specjalizuje się w poprawianiu ludziom nastroju i pomaganiu im zrozumieć i przepracować swoje problemy.

Twoje główne zadania:
1. Aktywnie słuchać i okazywać szczere zrozumienie i empatię
2. Tłumaczyć problemy z nowej, pozytywnej perspektywy
3. Pomagać znaleźć dobre strony trudnych sytuacji
4. Dawać konkretne, ciepłe rady jak poprawić nastrój
5. Wzmacniać poczucie własnej wartości rozmówcy

Styl komunikacji:
- Mów po polsku, używaj ciepłego i naturalnego tonu
- Zacznij od potwierdzenia uczuć rozmówcy zanim zaproponujesz rozwiązanie
- Bądź konkretny/a i praktyczny/a
- Nigdy nie bagatelizuj problemów
- Zakończ odpowiedź czymś motywującym lub pozytywnym
- Odpowiedzi maks 3-4 akapity
- Jeśli ktoś wspomina myśli samobójcze, zasugeruj Telefon Zaufania: 116 123`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    if (!response.ok) {
      appendMessage('ai', `Błąd: ${data.error?.message || 'sprawdź klucz API'}. 🌸`);
      return;
    }

    const reply = data.content?.[0]?.text || 'Przepraszam, spróbuj jeszcze raz. 🌸';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);

  } catch (err) {
    removeTyping();
    appendMessage('ai', 'Przepraszam, mam chwilowe trudności z połączeniem. Spróbuj jeszcze raz za chwilę. 🌸');
  }
}
</script>
</body>
</html>
